services:
  spirala-be:
    build:
      context: .
      dockerfile: Dockerfile
    image: spirala-be:latest
    container_name: spirala-be
    ports:
      - "45003:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      ENABLE_SWAGGER: "false"
      REDIS_URL: redis://spirala-redis:6379
    restart: unless-stopped
    networks:
      - spirala-prod-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  # Redis, Ollama, nginx, tunnel all live on this external network —
  # managed separately from the app lifecycle via infra/ compose files.
  spirala-prod-network:
    external: true
