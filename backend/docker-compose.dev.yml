services:
  spirala-be-dev:
    image: ghcr.io/perseusoft/spirala-be:dev
    container_name: spirala-be-dev
    ports:
      - "45002:3000"
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      ENABLE_SWAGGER: "true"
      REDIS_URL: redis://spirala-redis-dev:6379
    restart: unless-stopped
    networks:
      - spirala-dev-network
    depends_on:
      spirala-redis-dev:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  spirala-redis-dev:
    image: redis:7-alpine
    container_name: spirala-redis-dev
    ports:
      - "45010:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - spirala-dev-network
    volumes:
      - spirala-redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  spirala-redis-dev-data:

networks:
  spirala-dev-network:
    name: spirala-dev-network
