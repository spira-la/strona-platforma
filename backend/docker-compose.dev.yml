services:
  spirala-be-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: spirala-be-dev:latest
    container_name: spirala-be-dev
    ports:
      - "45002:3000"
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      ENABLE_SWAGGER: "true"
      REDIS_URL: redis://spirala-redis-dev:6379
    restart: unless-stopped
    networks:
      - spirala-dev-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  # Redis, Ollama live on this external network — managed separately
  # from the app lifecycle via infra/ compose files.
  spirala-dev-network:
    external: true
