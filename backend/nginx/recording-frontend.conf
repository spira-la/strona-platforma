# Recording-frontend nginx (DEV) — Spirala
#
# Serves the frontend SPA inside the egress container's internal network
# so the headless Chrome started by livekit-egress can load the recording
# template at http://recording-frontend-dev/ and capture it as HLS / MP4.
#
# Used by webinar recording. NOT used for 1-on-1 coaching sessions.
# Replica of BeWonderMe; only the backend upstream container name changes
# (bwm-be-dev → spirala-be-dev).

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver (dynamic resolution)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Proxy API requests to backend (dev)
    # Using a variable forces nginx to resolve DNS at request time, not startup
    location /api/ {
        set $backend_dev "spirala-be-dev:3000";
        proxy_pass http://$backend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy WebSocket connections to backend (dev)
    location /socket.io/ {
        set $backend_dev "spirala-be-dev:3000";
        proxy_pass http://$backend_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - all routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check (doesn't need backend)
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
