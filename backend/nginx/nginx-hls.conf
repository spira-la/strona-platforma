# Nginx HLS Segment Server (Spirala)
# Serves HLS segments and playlists from the shared Docker volume.
# This is an INTERNAL container — the host nginx (streamdev.spira-la.com /
# stream.spira-la.com) proxies requests to it.
#
# NOTE: CORS headers are handled by the host nginx proxy. Do NOT add CORS
# headers here to avoid duplicate headers which browsers reject.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # CRITICAL for live HLS: disable sendfile
    # With sendfile on, nginx uses kernel-space copy which can serve stale/partial
    # data when segments are being actively written by the egress. With sendfile off,
    # nginx reads via userspace read() and always gets the latest content.
    sendfile off;

    # Batch TCP packets for throughput, then flush immediately for low latency
    tcp_nopush on;
    tcp_nodelay on;

    # HLS segments and playlists
    location /hls/ {
        # M3U8 playlists — never cache (they update every segment duration)
        location ~ \.m3u8$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            types {
                application/vnd.apple.mpegurl m3u8;
            }
        }

        # TS segments — cache briefly (immutable once written)
        # With 1s segments, cache for 2s (2x segment duration)
        location ~ \.ts$ {
            add_header Cache-Control "public, max-age=2" always;
            types {
                video/mp2t ts;
            }
            # Cache file descriptors for recently-written segments
            # Avoids repeated disk open() calls for the same segment
            open_file_cache max=200 inactive=10s;
            open_file_cache_valid 2s;
            open_file_cache_min_uses 1;
            open_file_cache_errors off;
        }
    }

    # Health check
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
