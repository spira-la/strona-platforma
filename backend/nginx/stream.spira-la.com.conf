# Nginx Configuration for LiveKit PRODUCTION (Spirala)
# Subdomain: stream.spira-la.com
#
# Place this file in: /etc/nginx/sites-available/stream.spira-la.com
# Enable with: ln -s /etc/nginx/sites-available/stream.spira-la.com /etc/nginx/sites-enabled/

# Upstream for LiveKit PROD
upstream livekit_prod {
    server host.docker.internal:7880;  # LiveKit WebSocket/API port (prod)
}

# Upstream for HLS nginx container (PROD)
upstream nginx_hls_prod {
    server host.docker.internal:43040;  # nginx-hls container port (prod)
    keepalive 32;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name stream.spira-la.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server for LiveKit PRODUCTION
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name stream.spira-la.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/stream.spira-la.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream.spira-la.com/privkey.pem;

    # HLS streaming (served from Docker volume via nginx-hls container)
    location /hls/ {
        proxy_pass http://nginx_hls_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        # Disable buffering for low-latency live streaming
        proxy_buffering off;

        # CORS for HLS player
        add_header Access-Control-Allow-Origin "https://spira-la.com" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

        # Handle OPTIONS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://spira-la.com";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type "text/plain; charset=utf-8";
            add_header Content-Length 0;
            return 204;
        }
    }

    # M3U8 playlists — never cache (they update every segment duration)
    location ~ /hls/.*\.m3u8$ {
        proxy_pass http://nginx_hls_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Access-Control-Allow-Origin "https://spira-la.com" always;
    }

    # TS segments — cache very briefly for live (immutable once written)
    # max-age=2 matches segment duration — browser fetches next segment fresh
    location ~ /hls/.*\.ts$ {
        proxy_pass http://nginx_hls_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=2" always;
        add_header Access-Control-Allow-Origin "https://spira-la.com" always;
    }

    # WebSocket proxy for LiveKit
    location / {
        proxy_pass http://livekit_prod;
        proxy_http_version 1.1;

        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-lived WebSocket connections
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        # Disable buffering for real-time
        proxy_buffering off;
        proxy_cache off;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://livekit_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

# Note: For TURN/STUN (UDP/TCP on ports 7881-7882), configure at firewall level
# LiveKit clients will connect directly to these ports for media
# Ensure firewall allows:
#   - UDP 7881 (RTC)
#   - TCP/UDP 7882 (TURN)
