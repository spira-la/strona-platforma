services:
  spirala-fe:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: spirala-fe
    ports:
      - "45001:80"
    restart: unless-stopped
    networks:
      - spirala-prod-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  spirala-prod-network:
    name: spirala-prod-network
