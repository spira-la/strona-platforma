name: Deploy Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force deploy all services (skip change detection)'
        type: boolean
        default: true

jobs:
  # ------------------------------------------------------------------
  # Detect which parts of the monorepo changed
  # ------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      nginx: ${{ steps.filter.outputs.nginx }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            frontend:
              - 'frontend/**'
              - 'Dockerfile'
              - 'docker-compose.dev.yml'
            backend:
              - 'backend/**'
            nginx:
              - 'nginx/**'
              - 'docker-compose.nginx.yml'

  # ------------------------------------------------------------------
  # Sync the server to the latest commit on dev
  # ------------------------------------------------------------------
  git-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.SPIRALA_APP_DIR }}
            git fetch --all --prune --force
            git reset --hard origin/dev

  # ------------------------------------------------------------------
  # Build backend on server and restart container
  # ------------------------------------------------------------------
  deploy-backend:
    needs:
      - detect-changes
      - git-sync
    if: needs.detect-changes.outputs.backend == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.SPIRALA_APP_DIR }}/backend
            # Run database migrations before building
            set -a && source .env.development && set +a
            export NODE_TLS_REJECT_UNAUTHORIZED=0
            npm ci
            npm run db:migrate 2>&1 || echo "WARNING: migration failed or no pending migrations"
            # Build and deploy. We pass CACHEBUST so the COPY src/ layer
            # cannot be reused from a stale buildkit cache — guarantees
            # the running image always reflects the latest commit.
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            export CACHEBUST=$(git rev-parse HEAD)
            docker compose -f docker-compose.dev.yml build --build-arg CACHEBUST=$CACHEBUST
            docker compose -f docker-compose.dev.yml up -d --force-recreate
            # Health check with retries
            for i in $(seq 1 15); do
              if curl -sf http://localhost:45002/api/health > /dev/null 2>&1; then
                echo "Backend healthy (attempt $i)"
                exit 0
              fi
              echo "Waiting for backend... (attempt $i/15)"
              sleep 2
            done
            echo "WARNING: backend health check failed after 30s"

  # ------------------------------------------------------------------
  # Build frontend on server and restart nginx container
  # ------------------------------------------------------------------
  deploy-frontend:
    needs:
      - detect-changes
      - git-sync
    if: needs.detect-changes.outputs.frontend == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.SPIRALA_APP_DIR }}
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            docker compose -f docker-compose.dev.yml build
            docker compose -f docker-compose.dev.yml up -d --force-recreate
            sleep 3
            curl -sf http://localhost:45000/health || echo "WARNING: frontend health check failed"

  # ------------------------------------------------------------------
  # Reload Spirala reverse proxy if its config (nginx/) changed.
  # The nginx container uses network_mode: host, so it can mount the
  # bind-mounted config file and reload without re-pulling images.
  # ------------------------------------------------------------------
  deploy-nginx:
    needs:
      - detect-changes
      - git-sync
    if: needs.detect-changes.outputs.nginx == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.SPIRALA_APP_DIR }}
            docker compose -f docker-compose.nginx.yml up -d --force-recreate spirala-nginx-dev
            sleep 2
            docker exec spirala-nginx-dev nginx -t \
              && docker exec spirala-nginx-dev nginx -s reload \
              || echo "WARNING: nginx config test failed"

  # ------------------------------------------------------------------
  # Clean up dangling images to reclaim disk space
  # ------------------------------------------------------------------
  cleanup:
    needs:
      - deploy-backend
      - deploy-frontend
      - deploy-nginx
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Aggressive cleanup — prune dangling + unused images older than 48h
            # WARNING: never prune volumes automatically — they hold DB data
            docker image prune -f
            docker image prune -af --filter "until=48h"
            docker builder prune -af --filter "until=48h"
