name: Deploy Prod

on:
  push:
    branches:
      - main

jobs:
  # ------------------------------------------------------------------
  # Detect which parts of the monorepo changed
  # ------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'Dockerfile'
              - 'nginx/**'
              - 'docker-compose.prod.yml'
            backend:
              - 'backend/**'

  # ------------------------------------------------------------------
  # Sync the server to the latest commit on main
  # ------------------------------------------------------------------
  git-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.SPIRALA_APP_DIR_PROD }}
            git fetch --all --prune --force
            git reset --hard origin/main

  # ------------------------------------------------------------------
  # Build backend on server and restart container
  # ------------------------------------------------------------------
  deploy-backend:
    needs:
      - detect-changes
      - git-sync
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.SPIRALA_APP_DIR_PROD }}/backend
            # Run database migrations before building
            set -a && source .env.production && set +a
            npm ci --ignore-scripts
            npx drizzle-kit migrate 2>&1 || echo "WARNING: migration failed or no pending migrations"
            # Build and deploy
            docker compose -f docker-compose.yml build --no-cache
            docker compose -f docker-compose.yml up -d --force-recreate
            # Health check with retries
            for i in $(seq 1 15); do
              if curl -sf http://localhost:45003/api/health > /dev/null 2>&1; then
                echo "Backend healthy (attempt $i)"
                exit 0
              fi
              echo "Waiting for backend... (attempt $i/15)"
              sleep 2
            done
            echo "WARNING: backend health check failed after 30s"

  # ------------------------------------------------------------------
  # Build frontend on server and restart nginx container
  # ------------------------------------------------------------------
  deploy-frontend:
    needs:
      - detect-changes
      - git-sync
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.SPIRALA_APP_DIR_PROD }}/frontend
            npm ci
            npm run build
            cd ${{ secrets.SPIRALA_APP_DIR_PROD }}
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            sleep 3
            curl -sf http://localhost:45001/health || echo "WARNING: frontend health check failed"

  # ------------------------------------------------------------------
  # Clean up dangling images to reclaim disk space
  # ------------------------------------------------------------------
  cleanup:
    needs:
      - deploy-backend
      - deploy-frontend
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Prune only dangling (untagged) images — safe for running containers
            docker image prune -f
            docker builder prune -af --filter "until=24h"
