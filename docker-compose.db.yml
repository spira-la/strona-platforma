# =====================================================================
# Spirala — PostgreSQL database
#
# MANUAL use only — NOT part of the CI/CD pipeline.
# Start once on the server and leave running.
#
# Usage:
#   docker compose -f docker-compose.db.yml up -d
#
# Two databases created on init:
#   - spirala_dev (schema: spirala_dev_schema, user: spirala_dev)
#   - spirala_prod (schema: spirala_schema, user: spirala)
# =====================================================================

services:
  spirala-db:
    image: postgres:16-alpine
    container_name: spirala-db
    ports:
      - "45432:5432"
    environment:
      POSTGRES_USER: spirala_admin
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD:-SpR1l4_Adm1n_2026!}
      POSTGRES_DB: postgres
    volumes:
      - spirala-db-data:/var/lib/postgresql/data
      - ./docker/db-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped
    networks:
      - spirala-db-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spirala_admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "log_statement=none"

volumes:
  spirala-db-data:

networks:
  spirala-db-network:
    name: spirala-db-network
