# =====================================================================
# Spirala — PostgreSQL database
#
# MANUAL use only — NOT part of the CI/CD pipeline.
# Start once on the server and leave running.
#
# Setup:
#   1. Create .env.db with passwords (see .env.db.example)
#   2. docker compose -f docker-compose.db.yml up -d
#
# Two databases created on first run:
#   - spirala_dev  (schema: spirala_dev_schema, user: spirala_dev)
#   - spirala_prod (schema: spirala_schema,     user: spirala)
# =====================================================================

services:
  spirala-db:
    image: postgres:16-alpine
    container_name: spirala-db
    ports:
      - "45432:5432"
    env_file:
      - .env.db
    volumes:
      - spirala-db-data:/var/lib/postgresql/data
      - ./docker/db-init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    restart: unless-stopped
    networks:
      - spirala-db-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=128MB"

volumes:
  spirala-db-data:

networks:
  spirala-db-network:
    name: spirala-db-network
