# =====================================================================
# Spirala — Tunnel router nginx containers
#
# Managed by .github/workflows/deploy-{dev,prod}.yml — the deploy-nginx
# job recreates these containers when files under nginx/ or this compose
# file change. You can also run it manually:
#
#   docker compose -f docker-compose.nginx.yml up -d
# =====================================================================

services:
  spirala-nginx-prod:
    image: nginx:1.27-alpine
    container_name: spirala-nginx-prod
    volumes:
      - ./nginx/nginx-prod.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    network_mode: host

  spirala-nginx-dev:
    image: nginx:1.27-alpine
    container_name: spirala-nginx-dev
    volumes:
      - ./nginx/nginx-dev.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    network_mode: host
