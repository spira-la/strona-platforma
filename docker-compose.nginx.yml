# =====================================================================
# Spirala — Tunnel router nginx containers
#
# MANUAL use only — NOT part of the CI/CD pipeline.
# These containers receive traffic from Cloudflare Tunnel and proxy
# it to the correct frontend/backend containers.
#
# Usage:
#   docker compose -f docker-compose.nginx.yml up -d
# =====================================================================

services:
  spirala-nginx-prod:
    image: nginx:1.27-alpine
    container_name: spirala-nginx-prod
    volumes:
      - ./nginx/spirala-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /dev/null:/etc/nginx/conf.d/upstream.conf:ro
    command: >
      sh -c "rm -f /etc/nginx/conf.d/default.conf.bak &&
             sed -i 's/listen       80;/listen       8080;/' /etc/nginx/nginx.conf 2>/dev/null;
             nginx -g 'daemon off;'"
    restart: unless-stopped
    network_mode: host

  spirala-nginx-dev:
    image: nginx:1.27-alpine
    container_name: spirala-nginx-dev
    volumes:
      - ./nginx/spirala-dev.conf:/etc/nginx/conf.d/default.conf:ro
      - /dev/null:/etc/nginx/conf.d/upstream.conf:ro
    command: >
      sh -c "rm -f /etc/nginx/conf.d/default.conf.bak &&
             sed -i 's/listen       80;/listen       8081;/' /etc/nginx/nginx.conf 2>/dev/null;
             nginx -g 'daemon off;'"
    restart: unless-stopped
    network_mode: host
