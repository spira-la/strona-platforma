# =====================================================================
# Spirala — Production tunnel router nginx (port 8080)
# Cloudflare Tunnel routes external traffic to this nginx,
# which proxies to the correct Docker containers on localhost.
# =====================================================================

# Allow large file uploads (CMS images)
client_max_body_size 20m;

# Frontend: spira-la.com / www.spira-la.com → port 45001
# API calls (/api/*) go directly to the backend on port 45003
server {
    listen 8080 default_server;
    server_name spira-la.com www.spira-la.com;

    # API requests → backend
    location /api/ {
        proxy_pass http://127.0.0.1:45003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 20m;
    }

    # Everything else → frontend
    location / {
        proxy_pass http://127.0.0.1:45001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# Backend API: api.spira-la.com → port 45003
server {
    listen 8080;
    server_name api.spira-la.com;

    location / {
        proxy_pass http://127.0.0.1:45003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
