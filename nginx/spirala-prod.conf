# =====================================================================
# Spirala — Production tunnel router nginx (port 8080)
# Cloudflare Tunnel routes external traffic to this nginx,
# which proxies to the correct Docker containers on localhost.
# =====================================================================

# Frontend: spira-la.com / www.spira-la.com → port 45001
server {
    listen 8080;
    server_name spira-la.com www.spira-la.com;

    location / {
        proxy_pass http://127.0.0.1:45001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Backend API: api.spira-la.com → port 45003
server {
    listen 8080;
    server_name api.spira-la.com;

    location / {
        proxy_pass http://127.0.0.1:45003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future LiveKit/streaming features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
