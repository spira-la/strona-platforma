# =====================================================================
# Spirala — Dev tunnel router nginx (port 8081)
# Cloudflare Tunnel routes external traffic to this nginx,
# which proxies to the correct Docker containers on localhost.
# =====================================================================

# Allow large file uploads (CMS images)
client_max_body_size 20m;

# Frontend: dev.spira-la.com → port 45000
server {
    listen 8081 default_server;
    server_name dev.spira-la.com;

    location / {
        proxy_pass http://127.0.0.1:45000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# Backend API: apidev.spira-la.com → port 45002
server {
    listen 8081;
    server_name apidev.spira-la.com;

    location / {
        proxy_pass http://127.0.0.1:45002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
